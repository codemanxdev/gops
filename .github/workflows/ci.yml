name: CI

on:
  push:
    branches:
      - develop
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Lint
        run: npm run lint
      - name: Compile TypeScript
        run: npm run compile
      - name: Run unit tests
        run: npm run test:unit
      - name: Generate unit coverage reports
        run: npm run coverage:unit
      - name: Debug test files
        run: |
          echo "PWD:"
          pwd

          echo "Compiled JS tests:"
          find . -name "*.test.js"

          echo "TS tests:"
          find . -name "*.test.ts"

          echo "Dist directory:"
          find dist -type f || true
      - name: Run integration tests
        run: xvfb-run -a npm run test:integration
      - name: Generate integration coverage reports
        run: xvfb-run -a npm run coverage:integration
      - name: List coverage files
        run: |
          echo "Unit coverage files:"
          ls -l ./coverage/unit
          echo "Integration coverage files:"
          ls -l ./coverage/integration
      - name: Upload unit coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/unit/lcov.info
          flags: unit
      - name: Upload integration coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/integration/lcov.info
          flags: integration
